<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dice Game</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
        font-size: 40px;
    }

    .container {
        margin-top: 40px;
    }

    .kocke {
        font-size: 120px;
        margin: 20px;
        transition: transform 0.3s;
    }

    .roll {
        animation: spin 0.5s;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        margin: 10px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: #00c896;
        color: white;
        transition: 0.3s;
    }

    button:hover {
        background: #00a67d;
        transform: scale(1.05);
    }

    .score {
        margin-top: 20px;
        font-size: 24px;
    }
</style>
</head>

<body>

<h1>🎲 Dice Game</h1>

<div class="container">
    <div id="k1" class="kocke">⚀</div>
    <div id="k2" class="kocke">⚀</div>

    <br>

    <button onclick="baci()">Baci kocke</button>
    <button onclick="reset()">Reset</button>

    <div class="score">
        Trenutno: <span id="trenutno">0</span><br>
        Ukupno: <span id="ukupno">0</span>
    </div>
</div>

<audio id="zvuk">
    <source src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3" type="audio/mpeg">
</audio>

<script>
let ukupno = 0;

function randomKocka() {
    return Math.floor(Math.random() * 6) + 1;
}

function emoji(broj) {
    return ["⚀","⚁","⚂","⚃","⚄","⚅"][broj - 1];
}

function baci() {
    let k1 = document.getElementById("k1");
    let k2 = document.getElementById("k2");

    // animacija
    k1.classList.add("roll");
    k2.classList.add("roll");

    document.getElementById("zvuk").play();

    setTimeout(() => {
        let b1 = randomKocka();
        let b2 = randomKocka();

        k1.innerHTML = emoji(b1);
        k2.innerHTML = emoji(b2);

        let zbir = b1 + b2;
        ukupno += zbir;

        document.getElementById("trenutno").innerHTML = zbir;
        document.getElementById("ukupno").innerHTML = ukupno;

        k1.classList.remove("roll");
        k2.classList.remove("roll");
    }, 500);
}

function reset() {
    ukupno = 0;
    document.getElementById("ukupno").innerHTML = 0;
    document.getElementById("trenutno").innerHTML = 0;
}
</script>

</body>
</html>
